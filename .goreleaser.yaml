version: 2

before:
  hooks:
    - env GOTOOLCHAIN=local go mod tidy

builds:
  - id: diu
    main: ./cmd/diu
    binary: diu
    env:
      - CGO_ENABLED=0
      - GOTOOLCHAIN=local
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: diu
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - repository:
      owner: yowainwright
      name: homebrew-tap
    name: diu
    homepage: "https://github.com/yowainwright/diu"
    description: "Do I Use - Package Manager Execution Tracker"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "diu"
    test: |
      assert_match "diu", shell_output("#{bin}/diu --version")
      system bin/"diu", "--help"
    caveats: |
      DIU stores configuration in ~/.config/diu/config.json
      and execution data in ~/.local/share/diu.

      Quick start:
        diu daemon start
        diu daemon status

# No Linux packages needed for Mac-only release

release:
  github:
    owner: yowainwright
    name: diu
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
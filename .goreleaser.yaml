version: 2

before:
  hooks:
    - env GOTOOLCHAIN=local go mod tidy

builds:
  - id: diu
    main: ./cmd/diu
    binary: diu
    env:
      - CGO_ENABLED=0
      - GOTOOLCHAIN=local
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X github.com/yowainwright/diu/internal/core.Version={{.Version}}

archives:
  - id: diu
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# No Linux packages needed for Mac-only release

release:
  github:
    owner: yowainwright
    name: diu
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: |
          brew install goreleaser
          brew install mise

      - name: Run vet
        run: go vet ./...

      - name: Run linters
        run: golangci-lint run ./...

      - name: Run race tests
        run: go test -v -race ./...

      - name: Build release targets
        run: |
          GOOS=darwin GOARCH=amd64 go build -v -o /tmp/diu-darwin-amd64 ./cmd/diu
          GOOS=darwin GOARCH=arm64 go build -v -o /tmp/diu-darwin-arm64 ./cmd/diu

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          goreleaser release --clean

      - name: Update mise registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Would update mise registry here"
          # mise plugins update
          # mise install diu@latest

  homebrew:
    name: Update Homebrew Formula
    runs-on: macos-latest
    needs: release
    steps:
      - name: Update Homebrew tap
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          # This is handled by goreleaser, but we can add additional steps here
          echo "Homebrew formula updated via goreleaser"

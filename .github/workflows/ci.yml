name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.26.4'
  GOLANGCI_LINT_VERSION: 'v2.4.0'

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run linters
        run: |
          go vet ./...
          LINT_PACKAGE="github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          go run "$LINT_PACKAGE" run ./...

  test:
    name: Test
    runs-on: macos-latest
    strategy:
      matrix:
        go: ['1.25.11', '1.26.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        if: matrix.go == '1.26.4'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          name: diu-go
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  build:
    name: Build
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -v -o diu-darwin-${{ matrix.arch }} ./cmd/diu

      - name: Test binary
        if: matrix.arch == 'arm64' && runner.arch == 'ARM64' || matrix.arch == 'amd64' && runner.arch == 'X64'
        run: |
          ./diu-darwin-${{ matrix.arch }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diu-darwin-${{ matrix.arch }}
          path: diu-darwin-${{ matrix.arch }}

  integration:
    name: Integration Tests
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          pattern: diu-darwin-*
          path: .
          merge-multiple: true

      - name: Select binary
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            echo "DIU_BINARY=./diu-darwin-arm64" >> "$GITHUB_ENV"
          else
            echo "DIU_BINARY=./diu-darwin-amd64" >> "$GITHUB_ENV"
          fi

      - name: Make binary executable
        run: chmod +x "$DIU_BINARY"

      - name: Test daemon start/stop
        run: |
          "$DIU_BINARY" daemon start &
          sleep 5
          "$DIU_BINARY" daemon status
          "$DIU_BINARY" daemon stop

      - name: Test CLI commands
        run: |
          "$DIU_BINARY" --help
          "$DIU_BINARY" query --help
          "$DIU_BINARY" stats --help

  release-config:
    name: Release Config
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install GoReleaser
        run: |
          brew install goreleaser

      - name: Check GoReleaser config
        run: |
          goreleaser check

      - name: Check Homebrew formula
        run: |
          TMP_DIR="${RUNNER_TEMP}/diu-homebrew-formula"
          SOURCE_ARCHIVE="${TMP_DIR}/diu-0.0.0.tar.gz"
          FORMULA_PATH="${TMP_DIR}/diu.rb"
          SHA_FILE="${TMP_DIR}/sha256"
          TEST_TAP="yowainwright/diu-check"
          TEST_FORMULA="${TEST_TAP}/diu"

          cleanup_formula() {
            brew uninstall --force --ignore-dependencies diu || true
            brew untap "$TEST_TAP" || true
          }

          trap cleanup_formula EXIT
          brew untap "$TEST_TAP" || true

          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"

          tar -C "$GITHUB_WORKSPACE" \
            --exclude ".git" \
            --exclude "dist" \
            --exclude ".beads" \
            -czf "$SOURCE_ARCHIVE" .

          shasum -a 256 "$SOURCE_ARCHIVE" > "$SHA_FILE"
          read -r SOURCE_SHA256 _ < "$SHA_FILE"

          scripts/render-homebrew-formula.sh \
            "0.0.0" \
            "file://$SOURCE_ARCHIVE" \
            "$SOURCE_SHA256" > "$FORMULA_PATH"

          ruby -c "$FORMULA_PATH"
          brew tap-new --no-git "$TEST_TAP"
          TEST_TAP_REPO="$(brew --repository "$TEST_TAP")"
          cp "$FORMULA_PATH" "$TEST_TAP_REPO/Formula/diu.rb"

          brew install --build-from-source "$TEST_FORMULA"
          brew test "$TEST_FORMULA"

  security:
    name: Security Scan
    runs-on: macos-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec security scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out gosec-results.sarif ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'gosec-results.sarif'
